version: 0.1
policy_name: default_review
requires_human_approval:
  - delete_raw_file
  - archive_raw_file
  - deprecate_wiki_page
  - resolve_contradiction
  - merge_entities
  - split_entity
  - merge_concepts
  - mark_semantic_duplicate
  - promote_single_source_claim_to_concept
