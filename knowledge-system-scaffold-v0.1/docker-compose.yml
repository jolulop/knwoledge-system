services:
  app:
    build: .
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    working_dir: /workspace
    env_file:
      - .env
    profiles: ["app"]

  # Optional future vector database. Not required for the scaffold scripts.
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./indexes/vector/qdrant:/qdrant/storage
    profiles: ["vector"]
