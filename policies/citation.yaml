version: 0.1
policy_name: default_citation
require_citations_for:
  - claim
  - synthesis
  - query_answer
# Anchor fields a citation may use. The authoritative locator for a citation object
# (ADR-0019/0020) is (source_id, char_start, char_end); chunk_id is advisory only.
accepted_citation_anchors:
  - source_id
  - char_start
  - char_end
  - page
  - page_end
  - section
  - table_reference
  - sheet_reference
  - chunk_id        # advisory pointer only; recomputed, never trusted as identity
  - line_range      # reserved (transcripts)
  - timestamp       # reserved (audio/video transcripts)
  - image_id        # reserved (image/caption sources)
authoritative_anchor:
  - source_id
  - char_start
  - char_end
advisory_anchors:
  - chunk_id
when_no_source_found: "No source found in vault."
forbidden:
  - invented_filenames
  - invented_page_numbers
  - invented_line_numbers
  - invented_timestamps
  - fabricated_wikilinks
