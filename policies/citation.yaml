version: 0.1
policy_name: default_citation
require_citations_for:
  - claim
  - synthesis
  - query_answer
accepted_citation_anchors:
  - raw_path
  - source_page
  - page
  - section
  - timestamp
  - line_range
  - table_reference
  - sheet_reference
  - image_id
when_no_source_found: "No source found in vault."
forbidden:
  - invented_filenames
  - invented_page_numbers
  - invented_line_numbers
  - invented_timestamps
  - fabricated_wikilinks
