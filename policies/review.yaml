version: 0.1
policy_name: default_review
requires_human_approval:
  - delete_raw_file
  - archive_source          # reversible source status transition active -> archive_candidate (ADR-0036, Phase 7)
  - deprecate_wiki_page
  - resolve_contradiction
  - merge_entities
  - split_entity
  - merge_concepts
  - mark_semantic_duplicate
  - hide_content
  - promote_candidate_node      # candidate concept/entity -> active (ADR-0018, Phase 3.5b)
  - change_entity_subtype       # re-keys a node's id; gated like a merge/split
  - propose_synthesis           # candidate synthesis -> active; review-only, NO recurrence (ADR-0031, Phase 3.5c)
  - missing_raw_source          # catalogued raw file missing; record-only governance (ADR-0036, Phase 7)
  - purge_response_cache        # aggregate record-only proposal to manually purge the LLM cache (ADR-0036)
review_statuses:
  - pending
  - approved
  - rejected
  - deferred
priorities:
  - low
  - medium
  - high
