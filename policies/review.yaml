version: 0.1
policy_name: default_review
requires_human_approval:
  - delete_raw_file
  - archive_source          # reversible source status transition active -> archive_candidate (ADR-0036, Phase 7)
  - deprecate_wiki_page
  - resolve_contradiction
  - merge_items
  - split_item
  - mark_semantic_duplicate
  - hide_content
  - hide_semantic_page
  - unhide_content
  - unhide_semantic_page
  - hide_claim
  - unhide_claim
  - hide_synthesis              # governance synthesis visibility: active -> hidden (ADR-0049)
  - unhide_synthesis            # the inverse: hidden -> active (ADR-0049)
  - promote_candidate_node      # candidate knowledge item -> active (ADR-0018/0059)
  - change_item_type            # governed classification flip; metadata only, id unchanged (ADR-0059)
  - propose_synthesis           # candidate synthesis -> active; review-only, NO recurrence (ADR-0031, Phase 3.5c)
  - missing_raw_source          # catalogued raw file missing; record-only governance (ADR-0036, Phase 7)
  - purge_response_cache        # aggregate record-only proposal to manually purge the LLM cache (ADR-0036)
review_statuses:
  - pending
  - approved
  - rejected
  - deferred
priorities:
  - low
  - medium
  - high
