version: 0.1
policy_name: default_retention
raw_files:
  auto_delete: false
  deletion_requires_review: true
  archive_requires_review: true
  older_than_years_archive_candidate: 3
  archive_status: archive_candidate
wiki_pages:
  auto_delete: false
  deprecation_requires_review: true
  hide_requires_review: true
ephemeral:
  enabled: true
  delete_candidate_after_days: 90
  deletion_requires_review: true
response_cache:                 # raw LLM responses under db/ (ADR-0027)
  enabled: true
  location: db/
  # cache_ttl_days / cache_max_mb drive cache-purge candidate detection in /jobs/stale-check
  # (Phase 7-3, ADR-0036 decision 14): over-bounds -> one aggregate record-only purge_response_cache
  # review item. `enabled: false` turns the detection off. Purge itself is always manual (below).
  cache_ttl_days: 365           # entries older than this become purge candidates
  cache_max_mb: 2048            # soft cap; oldest entries become purge candidates beyond it
  purge_requires_review: true   # bulk purge forfeits reproducibility -> review-gated
  backup: true                  # included by scripts/backup.py by default (enforced)
  backup_opt_out_env: BACKUP_EXCLUDE_LLM_CACHE  # set truthy to exclude the cache (enforced)
statuses:
  - active
  - stale_candidate
  - deprecated_candidate
  - archive_candidate
  - archived
  - delete_candidate
  - deleted
