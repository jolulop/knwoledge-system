services:
  app:
    build: .
    # Reserved API port is 18000 (ADR-0005). The container listens on 0.0.0.0 (so the
    # published port is reachable), but it is published only to host loopback, so the
    # service is never exposed on LAN/public interfaces (Build Spec: local-only).
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 18000 --reload
    ports:
      - "127.0.0.1:18000:18000"
    volumes:
      - .:/workspace
    working_dir: /workspace
    env_file:
      - .env
    profiles: ["app"]

  # Optional future vector database. Not required for the scaffold scripts.
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./indexes/vector/qdrant:/qdrant/storage
    profiles: ["vector"]
