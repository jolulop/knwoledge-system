services:
  app:
    build: .
    # Reserved API port is 18000 (ADR-0005). Launched via the blessed entrypoint (python -m app.backend),
    # which binds Uvicorn to APP_HOST through the assert_safe_bind guard (ADR-0009) — never direct uvicorn.
    # A container is a narrow operational exception (NOT the recommended local launch): it MUST bind
    # 0.0.0.0 internally to be reachable, so it sets KS_ALLOW_INSECURE_BIND=1; the published port is pinned
    # to host loopback (127.0.0.1:), so the unauthenticated service is never on a LAN/public interface.
    # Dropping the `127.0.0.1:` prefix would expose it — do not.
    command: python -m app.backend
    environment:
      APP_HOST: "0.0.0.0"
      KS_ALLOW_INSECURE_BIND: "1"
      KS_RELOAD: "1"
    ports:
      - "127.0.0.1:18000:18000"
    volumes:
      - .:/workspace
    working_dir: /workspace
    env_file:
      - .env
    profiles: ["app"]

  # Optional future vector database. Not required for the scaffold scripts.
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./indexes/vector/qdrant:/qdrant/storage
    profiles: ["vector"]
